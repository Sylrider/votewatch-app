name: Refresh Data Pipeline

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      start:
        description: 'Roster offset to start from (0-based). Leave blank for 0.'
        required: false
        default: '0'
      count:
        description: 'How many officials to process this run (keeps runs short). Blank/0 = all.'
        required: false
        default: '50'
      force:
        description: 'Set to 1 to re-process officials that already have data (refresh funding/scores).'
        required: false
        default: '0'
  # Weekly refresh
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6am UTC

jobs:
  pipeline:
    name: Refresh Data Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed so the bot can push data/ back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Assert source files are pure ASCII (prevent mojibake)
        run: |
          node -e '
            const fs=require("fs"),path=require("path");
            const exts=[".tsx",".ts",".jsx",".js",".css"];
            const skip=["node_modules",".next",".git","data"];
            let bad=[];
            function walk(d){
              for(const e of fs.readdirSync(d,{withFileTypes:true})){
                if(skip.includes(e.name))continue;
                const p=path.join(d,e.name);
                if(e.isDirectory())walk(p);
                else if(exts.includes(path.extname(e.name))){
                  const t=fs.readFileSync(p,"utf8");
                  for(let i=0;i<t.length;i++){if(t.codePointAt(i)>126){bad.push(p+" non-ASCII at "+i);break;}}
                }
              }
            }
            ["app","components","lib"].forEach(function(d){ if(fs.existsSync(d)) walk(d); });
            if(bad.length){console.error("Non-ASCII in source:\n"+bad.join("\n"));process.exit(1);}
            console.log("ASCII check passed.");
          '

      - name: Install dependencies
        run: npm install

      - name: Run data pipeline
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          FORCE_REPROCESS: ${{ github.event.inputs.force || '0' }}
        run: npm run pipeline -- --start=${{ github.event.inputs.start || '0' }} --count=${{ github.event.inputs.count || '50' }}
        timeout-minutes: 90

      - name: Commit refreshed data
        run: |
          git config --local user.email "pipeline@votewatch.org"
          git config --local user.name "VoteWatch Pipeline Bot"
          git add data/
          git diff --staged --quiet || git commit -m "chore: refresh data [$(date -u +%Y-%m-%d)]"
          git push
