name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run pipeline weekly to refresh data from APIs
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6am UTC
      workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  # ─── Job 1: Run data pipeline (skip on PRs) ────────────────────────────────
  pipeline:
    name: Refresh Data Pipeline
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run data pipeline
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
        run: npm run pipeline
        timeout-minutes: 90

      - name: Upload pipeline data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: data/
          retention-days: 7

      - name: Commit refreshed data (weekly schedule only)
        if: github.event_name == 'schedule'
        run: |
          git config --local user.email "pipeline@votewatch.org"
          git config --local user.name "VoteWatch Pipeline Bot"
          git add data/
          git diff --staged --quiet || git commit -m "chore: refresh data [$(date -u +%Y-%m-%d)]"
          git push

  # ─── Job 2: Build Next.js static site ──────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    needs: [pipeline]
    if: always()   # build even if pipeline is skipped (e.g. on PRs)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pipeline data (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true  # OK if not available (will use existing data/)
        with:
          name: pipeline-data
          path: data/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https:/watchgov.orgv' }}
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-out
          path: out/
          retention-days: 1

  # ─── Job 3: Deploy to Cloudflare Pages ─────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'

    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: nextjs-out
          path: out/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: votewatch
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
